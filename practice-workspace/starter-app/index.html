<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Codex Daily Dashboard</title>
    <link rel="stylesheet" href="css/app.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="hero">
        <p class="eyebrow">Starter Prototype</p>
        <h1>Daily Work Dashboard</h1>
        <p class="lede">
          A small local dashboard learners personalize in Module 5.
        </p>
      </header>

      <section class="panel-grid">
        <article class="panel">
          <h2>Top Priorities</h2>
          <ul id="priorities"></ul>
        </article>

        <article class="panel">
          <h2>Weekly Wins</h2>
          <ul id="wins"></ul>
        </article>

        <article class="panel">
          <h2>Open Follow-Ups</h2>
          <ul id="followups"></ul>
        </article>
      </section>
    </main>

    <script src="js/app.js"></script>
  </body>
</html>
